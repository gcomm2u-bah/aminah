<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rumah — Property Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* … same CSS as before … */
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
   CONFIG – paste your Apps Script Web App URL here
   ============================================================ */
var API_URL = "";

// ---------- DEBUG HELPER ----------
var DEBUG = true; // set to false to disable logs

// ---------- API layer ----------
function apiUrl(){ return API_URL || localStorage.getItem("rumah_api") || ""; }

async function apiGet(){
  var url = apiUrl();
  console.log("[apiGet] URL:", url);
  if(DEBUG) console.log("[apiGet] Sending POST getAll...");
  try {
    var r = await fetch(url, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({action:"getAll"})
    });
    console.log("[apiGet] Response status:", r.status);
    if (!r.ok) {
      var txt = await r.text();
      throw new Error("HTTP " + r.status + " " + txt);
    }
    var j = await r.json();
    console.log("[apiGet] Data received:", j);
    if(!j.ok) throw new Error(j.error||"load failed");
    setSync("ok");
    return j.data;
  } catch(e) {
    console.error("[apiGet] FAILED:", e);
    setSync("err");
    throw e;
  }
}

async function apiPost(payload){
  setSync("saving");
  var url = apiUrl();
  if(DEBUG) console.log("[apiPost] Action:", payload.action);
  try{
    var r = await fetch(url, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
    if (!r.ok) {
      var txt = await r.text();
      throw new Error("HTTP " + r.status + " " + txt);
    }
    var j = await r.json();
    if(!j.ok) throw new Error(j.error||"save failed");
    setSync("ok");
    return j.result;
  }catch(e){
    setSync("err");
    console.error("[apiPost] FAILED:", e);
    throw e;
  }
}
var insertRow  = function(table,row){ return apiPost({action:"insert",table:table,row:row}); };
var updateRow  = function(table,row){ return apiPost({action:"update",table:table,row:row}); };
var deleteRow  = function(table,id){  return apiPost({action:"delete",table:table,id:id}); };
var replaceAll = function(table,rows){return apiPost({action:"replaceAll",table:table,rows:rows}); };
var saveReceiptPDF = function(paymentId, html){ return apiPost({action:"saveReceiptPDF", paymentId:paymentId, receiptHTML:html}); };
var setAppConfig   = function(key, value){ return apiPost({action:"setConfig", key:key, value:value}); };

// ---------- helpers (unchanged) ----------
var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function RM(n){return "RM "+Number(n||0).toLocaleString("en-MY",{minimumFractionDigits:2,maximumFractionDigits:2});}
function todayISO(){var d=new Date();return d.toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function el(id){return document.getElementById(id);}

// ---------- state ----------
var DB={Properties:[],Rooms:[],Tenants:[],Payments:[],Expenses:[],Config:{}};
var TAB="dashboard";
var openProp=null, editRoomId=null, tenantQuery="", rentFilter="all", reportYear=new Date().getFullYear();
var syncState="ok";

function setSync(s){ syncState=s; var d=el("syncDot"); if(d){ d.className="syncDot "+(s==="ok"?"":s); d.querySelector("span").textContent = s==="saving"?"Saving…":s==="err"?"Sync error":"All saved"; } }

// derived (unchanged)
function rooms(){ return DB.Rooms.map(function(r){ var p=DB.Properties.find(function(x){return x.id===r.propId;}); return Object.assign({},r,{propName:p?p.name:"?",dueDay:p?p.dueDay||1:1}); }); }
function tenantById(id){ return DB.Tenants.find(function(t){return t.id===id;}); }
function roomById(id){ return rooms().find(function(r){return r.id===id;}); }
function occupiedRooms(){ return rooms().filter(function(r){return r.tenantId;}); }
function vacantRooms(){ return rooms().filter(function(r){return !r.tenantId;}); }

// ============================================================
//  BOOT
// ============================================================
async function boot(){
  if(!apiUrl()){
    console.log("[boot] No API URL, showing connect screen.");
    renderConnect();
    return;
  }
  renderLoading();
  try{
    console.log("[boot] Calling apiGet...");
    var data = await apiGet();
    console.log("[boot] Data loaded, rendering.");
    DB.Properties = data.Properties || [];
    DB.Rooms      = data.Rooms || [];
    DB.Tenants    = data.Tenants || [];
    DB.Payments   = data.Payments || [];
    DB.Expenses   = data.Expenses || [];
    DB.Config     = data.Config || {};
    render();
  }catch(e){
    console.error("[boot] Caught error:", e.message);
    renderConnect("Error: " + e.message + " — see console (F12) for details.");
  }
}

function renderLoading(){
  el("app").innerHTML='<div class="loadWrap"><div class="spinner"></div><span style="color:var(--ink-soft)">Loading your ledger…</span></div>';
}

function renderConnect(errMsg){
  var saved = localStorage.getItem("rumah_api")||"";
  el("app").innerHTML =
  '<div class="connectWrap"><div class="connectCard">'+
    '<div class="connectMark">R</div>'+
    '<h1 style="font-size:26px">Connect your sheet</h1>'+
    '<p class="pageSub" style="margin-bottom:20px">Paste the Apps Script Web App URL (ends with <b>/exec</b>).</p>'+
    (errMsg?'<div class="dueBanner">'+esc(errMsg)+'</div>':'')+
    '<input class="inp" id="apiInput" placeholder="https://script.google.com/macros/s/…/exec" value="'+esc(saved)+'" style="margin-bottom:14px">'+
    '<button class="btn-primary full" onclick="saveApi()">Connect</button>'+
    '<p class="pageSub" style="margin-top:16px;font-size:12px">Check the console (F12) if you still get fetch errors.</p>'+
  '</div></div>';
}
function saveApi(){
  var v=el("apiInput").value.trim();
  if(!v) return;
  localStorage.setItem("rumah_api",v);
  API_URL=v;
  boot();
}

// … (the rest of the view functions and modals remain identical to the previous full version) …
// I’m omitting them here for brevity — they are exactly the same as in the last compiled HTML.
// Just copy your full previous script block (with all the views, modals, etc.) and replace
// the apiGet/apiPost with this debug version.
</script>
</body>
</html>
